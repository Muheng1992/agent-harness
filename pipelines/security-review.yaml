name: security-review
description: 安全審查週期，含安全掃描、修復、重新掃描驗證
stages:
  - name: security-scan
    role: security-auditor
    goal_template: '對 {feature} 進行全面安全掃描。檢查 OWASP Top 10、硬編碼密鑰、注入漏洞、認證缺陷、權限問題。輸出安全審查報告（含嚴重等級與修復建議）。'
    on_fail: scan-fix-loop
  - name: fix-vulnerabilities
    role: implementer
    goal_template: '根據安全掃描報告修復 {feature} 的所有安全漏洞。優先修復 Critical 和 High 等級問題。'
  - name: write-security-tests
    role: tester
    goal_template: '為 {feature} 撰寫安全相關測試。涵蓋注入防護、認證繞過、權限提升、敏感資料洩漏等情境。'
    on_fail: test-fix-loop
  - name: rescan
    role: security-auditor
    goal_template: '重新掃描 {feature}，驗證所有安全漏洞已修復。對比先前報告確認每個問題的修復狀態。輸出最終安全報告。'
    on_fail: rescan-fix-loop
fix_loops:
  scan-fix-loop:
    role: implementer
    goal_template: '安全掃描發現問題，立即修復：{fail_output}'
    max_iterations: 3
    then: security-scan
  test-fix-loop:
    role: debugger
    goal_template: '安全測試失敗，修復問題：{fail_output}'
    max_iterations: 3
    then: write-security-tests
  rescan-fix-loop:
    role: implementer
    goal_template: '重新掃描仍發現未修復的漏洞，繼續修復：{fail_output}'
    max_iterations: 3
    then: rescan
